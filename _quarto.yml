project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - reports/primary_care_architecture.qmd
    - docs/REPORTS-AND-DASHBOARD.md
    - docs/STREAMLIT-DEPLOYMENT.md
    - docs/public-site/model-dashboard-hardening-spec-v1.8.1.md
    - docs/public-site/streamlit-dashboard-contract-v1.8.1.md
    - docs/public-site/streamlit-dashboard-audit-v1.8.1.md
    - docs/public-site/post-surface-crosswalk-contract-v1.8.2.md
    - docs/public-site/game-theory-microeconomics-simulation-spec-v1.8.2.md
    - docs/public-site/evidence-tracker-public-v1.8.1.md
    - docs/public-site/calibration-readiness-page-v1.8.1.md
    - docs/calibration/model-card-v1.7.2.md
    - docs/launch/claim-boundaries-v1.7.2.md
    - README.md

website:
  title: "GTPCNZ"
  site-url: "https://edithatogo.github.io/gtpcnz/"
  navbar:
    left:
      - text: "Home"
        href: index.qmd
      - text: "Public report"
        href: reports/primary_care_architecture.qmd
      - text: "Dashboard"
        href: docs/REPORTS-AND-DASHBOARD.md
      - text: "Model card"
        href: docs/calibration/model-card-v1.7.2.md
      - text: "Claim boundaries"
        href: docs/launch/claim-boundaries-v1.7.2.md
      - text: "Evidence tracker"
        href: docs/public-site/evidence-tracker-public-v1.8.1.md
      - text: "Calibration readiness"
        href: docs/public-site/calibration-readiness-page-v1.8.1.md
      - text: "Dashboard contract"
        href: docs/public-site/streamlit-dashboard-contract-v1.8.1.md
      - text: "Post crosswalk"
        href: docs/public-site/post-surface-crosswalk-contract-v1.8.2.md
