project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - reports/primary_care_architecture.qmd
    - docs/REPORTS-AND-DASHBOARD.md
    - docs/STREAMLIT-DEPLOYMENT.md
    - README.md

website:
  title: "GTPCNZ"
  site-url: "https://edithatogo.github.io/gtpcnz/"
  navbar:
    left:
      - text: "Home"
        href: index.qmd
      - text: "Funding Architecture Report"
        href: reports/primary_care_architecture.qmd
      - text: "Dashboard"
        href: docs/REPORTS-AND-DASHBOARD.md
      - text: "Streamlit Deploy"
        href: docs/STREAMLIT-DEPLOYMENT.md
      - text: "Repository Guide"
        href: README.md
  page-footer:
    left: "GTPCNZ"
    right: "Generated with Quarto"

format:
  html:
    theme: cosmo
    toc: true
    code-fold: true
    page-layout: full

execute:
  echo: false
  warning: false
