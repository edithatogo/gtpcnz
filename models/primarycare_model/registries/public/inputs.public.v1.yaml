datasets:
  - dataset_id: population_denominators_public
    label: Public population denominators
    source_id: src_statsnz_population
    source: Stats NZ estimated resident population public tables.
    sensitivity_class: public_aggregate
    public_access_status: public
    licence_status: open_or_public_reference
    claim_boundary: Aggregate denominator only; no patient-level records.
    fields:
      - {field_name: jurisdiction, data_type: string, unit: code, required: true, description: Jurisdiction code.}
      - {field_name: year, data_type: integer, unit: calendar year, required: true, description: Public reporting year.}
      - {field_name: population_count, data_type: integer, unit: persons, required: true, description: Aggregate population count.}
  - dataset_id: primary_care_access_public
    label: Public primary care access indicators
    source_id: src_nz_health_survey
    source: New Zealand Health Survey public data explorer.
    sensitivity_class: public_aggregate
    public_access_status: public
    licence_status: public_reference
    claim_boundary: Published aggregate survey indicators only.
    fields:
      - {field_name: indicator_id, data_type: string, unit: code, required: true, description: Indicator code.}
      - {field_name: year, data_type: integer, unit: calendar year, required: true, description: Public reporting year.}
      - {field_name: value, data_type: number, unit: varies, required: true, description: Published aggregate value.}
  - dataset_id: pho_access_validation_source_metadata_public
    label: Public PHO access validation source metadata
    source_id: src_hnz_pho_access_timeseries
    source: Health NZ access to primary care quarterly workbook.
    sensitivity_class: public_aggregate
    public_access_status: public
    licence_status: public_reference
    claim_boundary: Workbook metadata establishes public validation-source availability only; it is not a passed holdout validation result.
    fields:
      - {field_name: source_id, data_type: string, unit: code, required: true, description: Source identifier.}
      - {field_name: raw_artifact_sha256, data_type: string, unit: sha256, required: true, description: Hash of the raw public workbook.}
      - {field_name: workbook_artifact, data_type: string, unit: filename, required: true, description: Raw workbook artifact filename.}
      - {field_name: sheet_name, data_type: string, unit: label, required: true, description: Workbook sheet name.}
      - {field_name: dimension, data_type: string, unit: Excel range, required: true, description: Sheet dimension range.}
      - {field_name: row_count, data_type: integer, unit: rows, required: true, description: Number of XML rows in the sheet.}
      - {field_name: max_observed_columns, data_type: integer, unit: columns, required: true, description: Maximum observed XML cell count across rows.}
      - {field_name: validation_use, data_type: string, unit: code, required: true, description: Validation family this sheet can support.}
