validation_source_candidates:
  - candidate_id: val_moh_planning_performance_historical
    source_id: src_moh_planning_performance_historical
    label: Ministry of Health planning and performance historical measures
    url_or_reference: https://www.health.govt.nz/monitoring-statistics/system-monitoring/planning-and-performance-data
    public_access_status: public
    licence_status: public_reference
    candidate_status: registered_retrieval_plan
    retrieval_path: landing_page_and_measure_links
    expected_grain: district_or_health_region_by_measure_period_where_public_downloads_permit
    claim_family: hospital_pressure_and_avoidable_admissions_validation
    cal_gates:
      - CAL-G-003
      - CAL-G-004
      - CAL-G-005
    independence_assessment: independent_of_current_calibration_targets
    current_runtime_use: not_loaded_public_runtime
    expected_raw_dir: data/public_raw/src_moh_planning_performance_historical
    expected_raw_artifact: planning-and-performance-data.html
    fetch_script: scripts/fetch_moh_planning_performance.py
    transform_script: scripts/transform_moh_planning_performance.py
    expected_processed_artifact: data/public_processed/src_moh_planning_performance_historical/planning_performance_inventory.csv
    rejection_reason: null
    not_valid_for:
      - precise fiscal savings
      - ED reductions
      - hospital-demand reductions
      - workforce effects
      - implementation impacts
      - causal effects
    claim_boundary: Public district/measure-level validation candidate only; not loaded by runtime and not a claim upgrade until raw downloads, checksums, transforms, schemas, and comparison gates pass.
  - candidate_id: val_hqsc_atlas_pho_variation
