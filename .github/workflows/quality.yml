name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install locked quality dependencies
        run: uv sync --frozen --all-groups

      - name: Ruff lint
        run: uv run ruff check .

      - name: Basedpyright strict type gate
        run: uv run python -m basedpyright --pythonpath "$(uv run python -c 'import sys; print(sys.executable)')"

      - name: Mypy strict compatibility gate
        run: uv run python -m mypy --strict --no-incremental models/primarycare_model/contracts models/primarycare_model/validation/pandera_schemas.py models/primarycare_model/engines

      - name: Concern boundary scan
        run: uv run python scripts/check_concern_boundaries.py

      - name: Patient-data scan
        run: uv run python scripts/check_no_patient_data.py

      - name: Tests with coverage threshold
        run: >
          uv run pytest -q
          models/tests/test_parameter_contracts.py
          --cov=models.primarycare_model.contracts.parameters
          --cov-report=term-missing
          --cov-fail-under=90

      - name: Dependency audit
        run: uv run pip-audit

      - name: Ty canary
        continue-on-error: true
        run: uv run ty check models/primarycare_model
