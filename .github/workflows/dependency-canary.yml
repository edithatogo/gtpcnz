name: Dependency canary

on:
  schedule:
    - cron: "17 18 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-canary-${{ github.ref }}
  cancel-in-progress: true

jobs:
  latest-compatible:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install latest compatible dependencies
        run: pip install --upgrade --upgrade-strategy eager -r requirements.txt

      - name: Check repository health
        run: python scripts/check_repo_health.py

      - name: Check concern boundaries
        run: python scripts/check_concern_boundaries.py

      - name: Run tests
        run: pytest -q

      - name: Install Quarto
        run: |
          curl -L -o quarto.deb https://github.com/quarto-dev/quarto-cli/releases/download/v1.9.37/quarto-1.9.37-linux-amd64.deb
          sudo dpkg -i quarto.deb
          quarto --version

      - name: Render Quarto website
        run: quarto render --to html

      - name: Verify Streamlit entrypoint imports
        run: python -m py_compile streamlit_app.py models/primarycare_model/app.py
