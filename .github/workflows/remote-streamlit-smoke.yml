name: Remote Streamlit smoke

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: remote-streamlit-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  remote-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install remote smoke dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run remote Streamlit smoke
        run: |
          python scripts/check_remote_streamlit_smoke.py \
            --url "https://gtpcnz.streamlit.app/?github_smoke=${{ github.run_id }}" \
            --attempts 8 \
            --sleep-seconds 75 \
            --settle-seconds 45 \
            --timeout-seconds 90
