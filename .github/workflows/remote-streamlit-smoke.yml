name: Remote Streamlit smoke

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: remote-streamlit-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  remote-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install remote smoke dependencies
        run: uv run --with playwright python -m playwright install --with-deps chromium

      - name: Run remote Streamlit smoke
        run: |
          uv run --with playwright python scripts/check_remote_streamlit_smoke.py \
            --url "https://gtpcnz.streamlit.app/?github_smoke=${{ github.run_id }}" \
            --attempts 8 \
            --sleep-seconds 75 \
            --settle-seconds 45 \
            --timeout-seconds 90
