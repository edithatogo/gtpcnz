name: Profiling

on:
  schedule:
    - cron: "23 18 * * 4"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: profiling-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scalene:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install latest compatible profiling dependencies
        run: uv sync --upgrade --all-groups

      - name: Run Scalene profile
        run: uv run python -m scalene --cli --reduced-profile --profile-all scripts/run_scalene_profile.py
