name: Hugging Face Space

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "dash_app/**"
      - "models/primarycare_model/**"
      - "outputs/full-parameterised-summary-results-v1.8.1.csv"
      - "pyproject.toml"
      - "pixi.lock"
      - "uv.lock"
      - "VERSION"
      - "VERSION.md"
      - ".github/workflows/huggingface-space.yml"

permissions:
  contents: read

concurrency:
  group: huggingface-space
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HF_SPACE_REPO: ${{ vars.HF_SPACE_REPO }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build minimal Space bundle
        shell: bash
        run: |
          set -euo pipefail
          rm -rf hf-space
          mkdir -p hf-space
          cp pyproject.toml VERSION VERSION.md hf-space/
          if [ -f pixi.lock ]; then cp pixi.lock hf-space/; fi
          cp dash_app/README.hf.md hf-space/README.md
          cp dash_app/Dockerfile hf-space/Dockerfile
          rsync -a dash_app/ hf-space/dash_app/ --exclude Dockerfile --exclude README.hf.md
          rsync -a models/ hf-space/models/ --exclude __pycache__ --exclude "*.pyc"
          mkdir -p hf-space/outputs
          cp outputs/full-parameterised-summary-results-v1.8.1.csv hf-space/outputs/

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.66.0
          cache: true
          manifest-path: hf-space/pyproject.toml

      - name: Validate Space app imports with Pixi
        working-directory: hf-space
        shell: bash
        run: pixi run -e dev python -m pytest -q models/tests/test_dashboard_service.py models/tests/test_dash_app.py

      - name: Trim validation-only and compatibility files
        shell: bash
        run: |
          set -euo pipefail
          rm -rf hf-space/models/tests
          rm -rf hf-space/models/primarycare_model/pages
          rm -f hf-space/models/primarycare_model/app.py
          find hf-space -type d -name __pycache__ -prune -exec rm -rf {} +
          find hf-space -type f -name "*.pyc" -delete

      - name: Skip deploy when HF_TOKEN is not configured
        if: ${{ env.HF_TOKEN == '' }}
        run: |
          echo "HF_TOKEN is not configured; built and validated the Space bundle only."

      - name: Push to Hugging Face Space
        if: ${{ env.HF_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail
          SPACE_REPO="${HF_SPACE_REPO:-edithatogo/gtpcnz-dashboard}"
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

          clone_delay=30
          for attempt in 1 2 3 4 5; do
            rm -rf hf-remote
            if git clone "https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${SPACE_REPO}" hf-remote; then
              break
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "::error::Hugging Face Space clone failed after ${attempt} attempts."
              exit 128
            fi
            echo "Hugging Face Space clone failed on attempt ${attempt}; retrying in ${clone_delay}s."
            sleep "${clone_delay}"
            clone_delay=$((clone_delay * 2))
          done

          rsync -a --delete --exclude ".git" hf-space/ hf-remote/
          git -C hf-remote add -A
          if git -C hf-remote diff --cached --quiet; then
            echo "No Hugging Face Space changes to deploy."
            exit 0
          fi
          git -C hf-remote commit -m "Deploy GTPCNZ Dash Space from ${GITHUB_SHA}"

          push_delay=30
          for attempt in 1 2 3 4 5; do
            if git -C hf-remote push; then
              exit 0
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "::error::Hugging Face Space push failed after ${attempt} attempts."
              exit 128
            fi
            echo "Hugging Face Space push failed on attempt ${attempt}; retrying in ${push_delay}s."
            git -C hf-remote pull --rebase || true
            sleep "${push_delay}"
            push_delay=$((push_delay * 2))
          done
