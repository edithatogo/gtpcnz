name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-render:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Check Conductor parallel contracts
        run: python scripts/check_conductor_parallel_tracks.py

      - name: Check public-only boundary
        run: python scripts/check_public_only_boundary.py

      - name: Check parameter traceability
        run: python scripts/check_parameter_traceability.py

      - name: Check public source snapshot
        run: python scripts/check_public_source_snapshot.py

      - name: Check public source retrieval plan
        run: python scripts/check_public_source_retrieval_plan.py

      - name: Check version consistency
        run: python scripts/check_version_consistency.py

      - name: Check dependency lock
        run: python scripts/check_dependency_lock.py

      - name: Run public aggregate calibration gate
        run: python scripts/run_public_aggregate_calibration.py --check-only

      - name: Run VOI gate
        run: python scripts/run_voi.py --check-only

      - name: Check repository health
        run: python scripts/check_repo_health.py

      - name: Check concern boundaries
        run: python scripts/check_concern_boundaries.py

      - name: Run tests
        run: pytest -q

      - name: Install Quarto
        run: |
          curl -L -o quarto.deb https://github.com/quarto-dev/quarto-cli/releases/download/v1.9.37/quarto-1.9.37-linux-amd64.deb
          sudo dpkg -i quarto.deb
          quarto --version

      - name: Render Quarto website
        run: quarto render --to html

      - name: Verify Streamlit entrypoint imports
        run: python -m py_compile streamlit_app.py models/primarycare_model/app.py

      - name: Run visual regression gate
        run: python scripts/run_visual_regression.py --check-only

      - name: Run accessibility audit
        run: python scripts/run_accessibility_audit.py --check-only

      - name: Check release model card
        run: python scripts/generate_release_model_card.py --check-only

      - name: Check release manifest
        run: python scripts/generate_release_manifest.py --check-only
