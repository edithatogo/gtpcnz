name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-render:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install locked Python dependencies
        run: uv sync --frozen --all-groups

      - name: Ruff lint
        run: uv run ruff check .

      - name: Check Conductor parallel contracts
        run: uv run python scripts/check_conductor_parallel_tracks.py

      - name: Check public-only boundary
        run: uv run python scripts/check_public_only_boundary.py

      - name: Check parameter traceability
        run: uv run python scripts/check_parameter_traceability.py

      - name: Check public source snapshot
        run: uv run python scripts/check_public_source_snapshot.py

      - name: Check public source retrieval plan
        run: uv run python scripts/check_public_source_retrieval_plan.py

      - name: Check public source fetch scripts
        run: uv run python scripts/check_public_source_fetch_scripts.py

      - name: Check public source transform scripts
        run: uv run python scripts/check_public_source_transform_scripts.py

      - name: Check public source readiness matrix
        run: uv run python scripts/check_public_source_readiness_matrix.py

      - name: Check transformed public input schemas
        run: uv run python scripts/check_transformed_schemas.py

      - name: Check public temporal period acquisition readiness
        run: uv run python scripts/check_public_temporal_period_acquisition.py

      - name: Check version consistency
        run: uv run python scripts/check_version_consistency.py

      - name: Check Substack schedule contract
        run: uv run python scripts/check_substack_schedule_contract.py

      - name: Check dependency lock
        run: uv run python scripts/check_dependency_lock.py

      - name: Check calibration target readiness
        run: uv run python scripts/check_calibration_target_readiness.py

      - name: Check calibration validation gates
        run: uv run python scripts/check_calibration_validation_gates.py

      - name: Check public policy-shock plausibility readiness
        run: uv run python scripts/check_public_policy_shock_plausibility.py

      - name: Check posterior predictive readiness
        run: uv run python scripts/check_posterior_predictive_checks.py

      - name: Run public aggregate calibration gate
        run: uv run python scripts/run_public_aggregate_calibration.py --check-only

      - name: Run VOI gate
        run: uv run python scripts/run_voi.py --check-only

      - name: Check repository health
        run: uv run python scripts/check_repo_health.py

      - name: Check concern boundaries
        run: uv run python scripts/check_concern_boundaries.py

      - name: PHI compliance gate
        run: uv run python scripts/check_no_patient_data.py --verbose

      - name: Run tests
        run: uv run pytest -q

      - name: Install Quarto
        run: |
          curl -L -o quarto.deb https://github.com/quarto-dev/quarto-cli/releases/download/v1.9.37/quarto-1.9.37-linux-amd64.deb
          sudo dpkg -i quarto.deb
          quarto --version

      - name: Render Quarto website
        run: quarto render --to html

      - name: Verify Streamlit entrypoint imports
        run: uv run python -m py_compile streamlit_app.py models/primarycare_model/app.py

      - name: Run visual regression gate
        run: uv run python scripts/run_visual_regression.py --check-only

      - name: Run accessibility audit
        run: uv run python scripts/run_accessibility_audit.py --check-only

      - name: Check release model card
        run: uv run python scripts/generate_release_model_card.py --check-only

      - name: Check release manifest
        run: uv run python scripts/generate_release_manifest.py --check-only
