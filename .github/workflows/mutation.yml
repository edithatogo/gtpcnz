name: Mutation Testing

on:
  schedule:
    - cron: "47 18 * * 3"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutmut:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install locked quality dependencies
        run: uv sync --frozen --all-groups

      - name: Run mutation tests
        run: uv run mutmut run --paths-to-mutate models/primarycare_model/runtime_lab.py models/primarycare_model/scenario_service.py
