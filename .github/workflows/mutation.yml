name: Mutation Testing

on:
  schedule:
    - cron: "47 18 * * 3"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutmut:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install quality dependencies
        run: pip install -r requirements-dev.txt

      - name: Run mutation tests
        run: mutmut run --paths-to-mutate models/primarycare_model/runtime_lab.py models/primarycare_model/scenario_service.py
